site_name: rtvoice
theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            extensions:
              - griffe_typingdoc
            unwrap_annotated: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            docstring_section_style: table
            show_source: false

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
    - Tools: guides/tools.md
    - Supervisor Agent: guides/supervisor.md
    - MCP Servers: guides/mcp.md
    - Listener: guides/listener.md
  - API Reference:
    - RealtimeAgent: api/agent.md
    - Providers: api/providers.md
    - Configuration: api/configuration.md
    - Lifecycle Events: api/lifecycle_events.md
    - Supervisor: api/supervisor.md
    - Tools: api/tools.md
    - Audio: api/audio.md
